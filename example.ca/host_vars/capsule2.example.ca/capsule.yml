# This file contains documentation on almost all the of the configurations that you can set
# for satellite-installer scenario=capsule. You can set of them at build install time or after the
# fact using the ansible.satellite collection

# The capsule installation command is generated by satellite-installer as part of the preparation on
# the satellite primary
# The rhis-provisioner code captures the required installation options as part of the initial deployment
# and copies the script to the capsule and executes instead.

# For now this is just reference information
# We will add code in future to incorporate these additional configuration components on a per capsule basis

# --skip-checks-i-know-better
