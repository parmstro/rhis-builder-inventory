---

templates_default_monthly_publish:
  - name: "MonthlyPublishContent"
    description: "Publish all SOE Content"
    job_type: "run"
    organization: "Default"
    inventory: "TheProvisioner"
    project: "rhis-builder-pipelines"
    execution_environment: "satellite_ee_9"
    playbook: "publish_only.yml"
    become_enabled: true
    credentials:
      - "default_machine"
      - "default_vault"
      - "rhis_{{ _global_domain_name }}_satellite"
    variables:
      force_publish_all: true
      skip_publish_all: false
      description: "Published by rhis-builder-pipelines"
      satellite_organization: "{{ satellite_organization }}"
      satellite_location: "{{ satellite_location }}"
      satellite_validate_certs: true
      content_views:
        - name: "AAP24_Files"
          date_filter_name: "Include_Errata_By_Date"
          publication_threshold_hours: 24
          force_publish: false
          environments:
            - "Library"
        - name: "AAP24_RPMs"
          date_filter_name: "Include_Errata_By_Date"
          publication_threshold_hours: 24
          force_publish: false
          environments:
