---

templates_soe_qa:
  - name: "QA1DeployQATestServers"
    description: "Deploy JBoss, LAMP and Wordpress test machines to Qualification"
    job_type: "run"
    organization: "Default"
    inventory: "TheProvisioner"
    project: "rhis-builder-pipelines"
    execution_environment: "satellite_ee_9"
    playbook: "create_hosts.yml"
    become_enabled: true
    credentials:
      - "idm_machine"
      - "default_vault"
      - "rhis_{{ _global_domain_name }}_satellite"
    variables:
      ansible_python_interpreter: "/usr/bin/python3.9"
      enable_debug_logging: false
      host_build_comment: "Created by ansible for content test"
      deploy: true
      post_deploy_timeout: 600  # seconds
      use_sync_build: false     # true will wait for each server
      build_release_limit: 10   # will release builds in groups
      satellite_organization: "{{ satellite_organization }}"
      satellite_location: "{{ satellite_location }}"
      satellite_validate_certs: true
      platform_hosts:
        - fqdn: "qatestjboss2.{{ _global_domain_name }}"
          delete_host: false
          organization: "{{ satellite_organization }}"
          location: "{{ satellite_location }}"
          hostgroup: "hg_x86_64_rhel9_vm/qa/soe9_qa_jboss"
          activation_keys: "SOE9_qa_JBoss"
          lifecycle_environment: "Qualification"
          content_view: "SOE9"
          compute_resource: "VMware_Lab"
          compute_profile: "SOE_Medium"
          ptable: "Kickstart default"
          pxe_loader: "Grub2 UEFI"
          mac: "00:50:56:ff:ff:ff"
          comment: "rhis_test_host deleteme"
        - fqdn: "qatestlamp2.{{ _global_domain_name }}"
          delete_host: false
          organization: "{{ satellite_organization }}"
          location: "{{ satellite_location }}"
          hostgroup: "hg_x86_64_rhel9_vm/qa/soe9_qa_lamp"
          activation_keys: "SOE9_qa"
          lifecycle_environment: "Qualification"
          content_view: "SOE9"
          compute_resource: "VMware_Lab"
          compute_profile: "SOE_Medium"
          ptable: "Kickstart default"
          pxe_loader: "Grub2 UEFI"
          mac: "00:50:56:ff:ff:ff"
          comment: "rhis_test_host deleteme"
        - fqdn: "qatestwordpress2.{{ _global_domain_name }}"
          delete_host: false
          organization: "{{ satellite_organization }}"
          location: "{{ satellite_location }}"
          hostgroup: "hg_x86_64_rhel9_vm/qa/soe9_qa_wordpress"
          activation_keys: "SOE9_qa_EPEL"
          lifecycle_environment: "Qualification"
          content_view: "SOE9"
          compute_resource: "VMware_Lab"
          compute_profile: "SOE_Medium"
          ptable: "Kickstart default"
          pxe_loader: "Grub2 UEFI"
          mac: "00:50:56:ff:ff:ff"
          comment: "rhis_test_host deleteme"

  - name: "QA2SnapshotQATestServers"
    description: "Snapshot JBoss, LAMP and Wordpress test machines in Qualification"
    job_type: "run"
    organization: "Default"
    inventory: "TheProvisioner"
    project: "rhis-builder-pipelines"
    execution_environment: "satellite_ee_9"
    playbook: "vmware/vmw_create_snapshot.yml"
    become_enabled: true
    credentials:
      - "idm_machine"
      - "default_vault"
      - "rhis_{{ _global_domain_name }}_vmware1"
    variables:
      datacenter_folder: "/parmstrong.ca/vm"
      vmware_validate_certs: false
      host_list:
        - name: qatestjboss2.{{ _global_domain_name }}
          snap_name: qatestjboss2.original
          snap_description: "test base jboss build - delete me"
          quiesce: true
        - name: qatestlamp2.{{ _global_domain_name }}
          snap_name: qatestlamp2.original
          snap_description: "test base LAMP build - delete me"
          quiesce: true
        - name: qatestwordpress2.{{ _global_domain_name }}
          snap_name: qatestwordpress2.original
          snap_description: "test base WordPress build - delete me"
          quiesce: true

  - name: "QA3.1.1BuildQAJBoss"
    description: "QA Deploy JBoss application"
    job_type: "run"
    organization: "Default"
    inventory: "SOE_qa_pipeline_inventory"
    project: "rhis-builder-pipelines"
    execution_environment: "satellite_ee_9"
    playbook: "testcontent/jboss-standalone/main.yml"
    limit: "JBoss"
    become_enabled: true
    credentials:
      - "idm_machine"
      - "default_vault"
    variables:
      ansible_python_interpreter: /usr/bin/python3.9
      http_port: 8080
      https_port: 8443
      sample_app_git_repo: https://github.com/parmstro/jboss-eap-quickstarts.git
      sample_app_git_version: "8.0.x"
      sample_app_root: /samples/jboss
      sample_app_dir: kitchensink/
      app_fingerprint: /samples/jboss/c0df90d8-5173-4e65-bc82-88b6033fc6a0
      jboss_version_repo: "jb-eap-8.1-for-rhel-9-x86_64-rpms"
      jboss_eap_group: "@jboss-eap8"
      jboss_eap_service: "eap8-standalone.service"
      jboss_home: "/opt/rh/eap8/root/usr/share/wildfly"
      jboss_standalone_conf_path: "/etc/opt/rh/eap8/wildfly/eap8-standalone.conf"
      maven_group: "@maven:3.9"
      jboss_deploy_standalone: true
      server_config: "standalone"

  - name: "QA3.1.2TestQAJBoss"
    description: "QA Test JBoss application"
    job_type: "run"
    organization: "Default"
    inventory: "SOE_qa_pipeline_inventory"
    project: "rhis-builder-pipelines"
    execution_environment: "satellite_ee_9"
    playbook: "testcontent/jboss-standalone/deploymenttest.yml"
    limit: "JBoss"
    become_enabled: true
    credentials:
      - "idm_machine"
      - "default_vault"
    variables:
      ansible_python_interpreter: "/usr/bin/python3.9"
      jboss_deploy_standalone: true
      http_port: 8080
      https_port: 8443
      sample_app_git_repo: "https://github.com/parmstro/jboss-eap-quickstarts.git"
      sample_app_git_version: "8.0.x"
      sample_app_root: "/samples/jboss"
      sample_app_dir: "kitchensink/"
      app_fingerprint: "/samples/jboss/c0df90d8-5173-4e65-bc82-88b6033fc6a0"

  - name: "QA3.2.1BuildQALAMP"
    description: "Build LAMP stack application"
    job_type: "run"
    organization: "Default"
    inventory: "SOE_qa_pipeline_inventory"
    project: "rhis-builder-pipelines"
    execution_environment: "satellite_ee_9"
    playbook: "testcontent/lamp_simple/main.yml"
    limit: "LAMP"
    become_enabled: true
    credentials:
      - "idm_machine"
      - "default_vault"
    variables:
      ansible_python_interpreter: "/usr/bin/python3.9"
      mysql_bind_address_ipv4: "0.0.0.0"
      mysql_port: "3306"
      mysql_port_protocol: "tcp"

  - name: "QA3.2.2TestQALAMP"
    description: "QA Test LAMP stack application"
    job_type: "run"
    organization: "Default"
    inventory: "SOE_qa_pipeline_inventory"
    project: "rhis-builder-pipelines"
    execution_environment: "satellite_ee_9"
    playbook: "testcontent/lamp_simple/deploymenttest.yml"
    limit: "LAMP"
    become_enabled: true
    credentials:
      - "idm_machine"
      - "default_vault"
    variables:
      ansible_python_interpreter: "/usr/bin/python3.9"

  - name: "QA3.3.1BuildQAWordpress"
    description: "QA Build WordPress application"
    job_type: "run"
    organization: "Default"
    inventory: "SOE_qa_pipeline_inventory"
    project: "rhis-builder-pipelines"
    execution_environment: "satellite_ee_9"
    playbook: "testcontent/wordpress-nginx/main.yml"
    limit: "WordPress"
    become_enabled: true
    credentials:
      - "idm_machine"
      - "default_vault"
    variables:
      ansible_python_interpreter: "/usr/bin/python3.9"
      epel_rpms_repo_name: "Default_Organization_EPEL9_EPEL9"
      wp_version: "6.8.3"
      wp_url: "https://en-ca.wordpress.org/wordpress-6.8.3-en_CA.tar.gz"
      wp_checksum: "sha1:https://en-ca.wordpress.org/wordpress-6.8.3-en_CA.tar.gz.sha1"
      nginx_bind_address: "0.0.0.0"
      nginx_port: 80
      nginx_port_protocol: "tcp"
      server_hostname: "testwordpress2.parmstrong.ca"
      acm_nginx_conf_file: "acm.conf"
      mysql_bind_address_ipv4: "0.0.0.0"
      mysql_port: "3306"
      mysql_port_protocol: "tcp"
      auto_up_disable: false
      core_update_level: true

  - name: "QA3.3.2TestQAWordpress"
    description: "QA Test WordPress application"
    job_type: "run"
    organization: "Default"
    inventory: "SOE_qa_pipeline_inventory"
    project: "rhis-builder-pipelines"
    execution_environment: "satellite_ee_9"
    playbook: "testcontent/wordpress-nginx/deploymenttest.yml"
    limit: "WordPress"
    become_enabled: true
    credentials:
      - "idm_machine"
      - "default_vault"
    variables:
      ansible_python_interpreter: "/usr/bin/python3.9"

  - name: "QA4PromoteToProd"
    description: "Promote the SOE Content for JBoss, LAMP and Wordpress machines to Qualification"
    job_type: "run"
    organization: "Default"
    inventory: "TheProvisioner"
    project: "rhis-builder-pipelines"
    execution_environment: "satellite_ee_9"
    playbook: "promote_only.yml"
    become_enabled: true
    credentials:
      - idm_machine
      - default_vault
      - "rhis_{{ _global_domain_name }}_satellite"
    variables:
      force_promote_all: true
      enable_debug_logging: false
      description: "Published by rhis-builder"
      satellite_organization: "{{ satellite_organization }}"
      satellite_location: "{{ satellite_location }}"
      satellite_validate_certs: true
      source_lce: "Qualification"
      target_lce: "Production"
      content_views:
        - name: "SOE9"
      composite_content_views:
        - name: "SOE9_JBoss"
        - name: "SOE9_EPEL"

  - name: "QA5DeleteQASnapshots"
    description: "Delete QA test machine snapshots"
    job_type: "run"
    organization: "Default"
    inventory: "TheProvisioner"
    project: "rhis-builder-pipelines"
    execution_environment: "satellite_ee_9"
    playbook: "vmware/vmw_delete_snapshot.yml"
    become_enabled: true
    credentials:
      - "idm_machine"
      - "default_vault"
      - "rhis_{{ _global_domain_name }}_vmware1"
    variables:
      datacenter_folder: "/parmstrong.ca/vm"
      vmware_validate_certs: false
      host_list:
        - name: qatestjboss2.{{ _global_domain_name }}
          snap_name: qatestjboss2.original
          snap_description: "test base jboss build - delete me"
          quiesce: true
        - name: qatestlamp2.{{ _global_domain_name }}
          snap_name: qatestlamp2.original
          snap_description: "test base LAMP build - delete me"
          quiesce: true
        - name: qatestwordpress2.{{ _global_domain_name }}
          snap_name: qatestwordpress2.original
          snap_description: "test base WordPress build - delete me"
          quiesce: true

  - name: "QA6FPowerOffQATestServers"
    description: "PowerOff JBoss, LAMP and Wordpress test machines in Qualification"
    job_type: "run"
    organization: "Default"
    inventory: "TheProvisioner"
    project: "rhis-builder-pipelines"
    execution_environment: "satellite_ee_9"
    playbook: "vmware/vmw_power_off_vm.yml"
    become_enabled: true
    credentials:
      - "idm_machine"
      - "default_vault"
      - "rhis_{{ _global_domain_name }}_vmware1"
    variables:
      datacenter_folder: "/parmstrong.ca/vm"
      vmware_validate_certs: false
      host_list:
        - name: qatestjboss2.{{ _global_domain_name }}
        - name: qatestlamp2.{{ _global_domain_name }}
        - name: qatestwordpress2.{{ _global_domain_name }}

  - name: "QA6SDeleteQATestServers"
    description: "After approval, delete JBoss, LAMP and Wordpress test machines in Qualification"
    job_type: "run"
    organization: "Default"
    inventory: "TheProvisioner"
    project: "rhis-builder-pipelines"
    execution_environment: "satellite_ee_9"
    playbook: "delete_hosts.yml"
    become_enabled: true
    credentials:
      - "idm_machine"
      - "default_vault"
      - "rhis_{{ _global_domain_name }}_satellite"
    variables:
      enable_debug_logging: false
      satellite_organization: "{{ satellite_organization }}"
      satellite_location: "{{ satellite_location }}"
      satellite_validate_certs: true
      host_list:
        - name: qatestjboss2.{{ _global_domain_name }}
        - name: qatestlamp2.{{ _global_domain_name }}
        - name: qatestwordpress2.{{ _global_domain_name }}

...
