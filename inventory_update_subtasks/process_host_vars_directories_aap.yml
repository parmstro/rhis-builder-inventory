---

- name: "Create {{ system_info.key }}{{ item | int + 1 }}.{{ global_domain_name }} host_vars directory"  # noqa name[template]
  ansible.builtin.file:
    path: "{{ deployment_dir }}/host_vars/{{ system_info.key }}{{ item | int + 1 }}.{{ global_domain_name }}"
    state: directory
    mode: "0755"
  loop: "{{ range(0, system_info.value | int) | list }}"

- name: "Defining {{ system_info.key }}{{ rhis_aap_release_version_concat }} host_vars directory Config as Code definitions"  # noqa name[template]
  # debug:
  #  msg:
  #    - "rsync {{ system_info.key }}{{ rhis_aap_release_version_concat }} template to {{ system_info.key }}{{ item | int + 1 }}.{{ global_domain_name }}"
  #    - "{{ system_info.key | regex_replace('^(.{3}).*$', '\\1') }}"
  ansible.posix.synchronize:
    src: "inventory_template/host_vars/{{ system_info.key }}{{ rhis_aap_release_version_concat }}/"
    dest: "./{{ deployment_dir }}/host_vars/{{ system_info.key }}{{ item | int + 1 }}.{{ global_domain_name }}/"
    delete: true # Remove files in dest not in src
    recursive: true
    rsync_opts:
      - "--exclude=*.j2"
  loop: "{{ range(0, system_info.value | int) | list }}"
...
