---
# WARNING: Networks, Datastores and other underlying hypervisor/hyperscaler resources
# referenced in your configurations MUST already exist.
# Satellite, in particular, will use supplied credentials to log in and validate that
# resource referenced in your compute resources and compute profiles exist. If they do not,
# the compute_profiles role will fail. We look forward to implementing creation of these
# resources in the landing zone repositories in future

# GLOBAL VARIABLES THAT APPLY TO ALL HOSTS
global_domain_name: "savage.test"

default_network: "192.168.140.0"
default_network_prefix: "22"
default_network_mask: "255.255.252.0"

rhis_primary_city: "Greenville"
rhis_primary_state: "South Carolina"
rhis_timezone: "America/New_York"
rhis_locale: "en"

rhis_time_servers:
  - "0.rhel.pool.ntp.org"
  - "1.rhel.pool.ntp.org"
  - "2.rhel.pool.ntp.org"
  - "3.rhel.pool.ntp.org"

rhis_aap_release_version: "2.4"

rhis_system_count:
  satellite: 1
  discosatellite: 1
  capsule:   2
  idm: 1
  aapcontroller: 1
  aaphub: 1
  quadlet: 2
  clevis: 1

rhis_aws_region: "us-east-2"
rhis_azure_region: "East US 2"
...
